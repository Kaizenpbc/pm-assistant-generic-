name: CI/CD — Test, Build & Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Type Check & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install client dependencies
        run: cd src/client && npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run

  build-and-deploy:
    name: Build & Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install client dependencies
        run: cd src/client && npm ci

      - name: Build server & client
        run: npm run build

      - name: Copy migration SQL files
        run: cp src/server/database/migrations/*.sql dist/server/database/migrations/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 147.5.127.99 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy server
        run: scp -r dist/server ubuntu@147.5.127.99:/opt/pm-app/dist/

      - name: Deploy client
        run: |
          tar czf /tmp/client-dist.tar.gz -C src/client/dist .
          scp /tmp/client-dist.tar.gz ubuntu@147.5.127.99:/tmp/
          ssh ubuntu@147.5.127.99 "rm -rf /opt/pm-app/client-dist/assets && tar xzf /tmp/client-dist.tar.gz -C /opt/pm-app/client-dist"

      - name: Restart & verify
        run: |
          ssh ubuntu@147.5.127.99 "sudo systemctl restart pm-app"
          sleep 3
          ssh ubuntu@147.5.127.99 "sudo systemctl is-active pm-app"
          ssh ubuntu@147.5.127.99 "curl -sf http://127.0.0.1:3001/health | head -c 200"
